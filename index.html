<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrlePedia — The Free Encyclopedia</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Modern Wiki Design Tokens */
        :root {
            --bg-canvas: #f6f6f6;
            --bg-page: #ffffff;
            --wiki-blue: #36b;
            --wiki-blue-hover: #447ff5;
            --wiki-red: #dd3333;
            --border-wiki: #a2a9b1;
            --text-dark: #202122;
            --text-muted: #54595d;
            
            /* GitHub Diff Theme Colors */
            --diff-remove-bg: #ffebe9;
            --diff-remove-text: #65020c;
            --diff-add-bg: #e6ffec;
            --diff-add-text: #0a3014;
            
            /* Byte Change Colors */
            --bytes-positive: darkgreen;
            --bytes-negative: #dc3545;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background-color: var(--bg-canvas); color: var(--text-dark); display: flex; min-height: 100vh; }

        /* Modern Loading Overlay Module */
        #appLoaderOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f6f6f6;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            font-family: sans-serif;
            transition: opacity 0.4s ease, visibility 0.4s;
        }
        .loader-card {
            background: white;
            padding: 2.5rem;
            border-radius: 8px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.08);
            border: 1px solid #a2a9b1;
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        .loader-logo {
            font-family: Georgia, serif;
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 1.5rem;
            letter-spacing: -1px;
        }
        .loader-logo span { color: var(--wiki-blue); }
        .progress-track {
            width: 100%;
            height: 6px;
            background: #eaecf0;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 1rem;
        }
        .progress-bar-fill {
            width: 0%;
            height: 100%;
            background: var(--wiki-blue);
            border-radius: 20px;
            transition: width 0.3s ease;
        }
        .loader-status-msg {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
        }
        .loader-percentage-counter {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--text-dark);
        }
        .loader-error-badge {
            display: none;
            background: #ffebe9;
            color: #65020c;
            border: 1px solid #ffc1bd;
            padding: 0.75rem;
            border-radius: 4px;
            font-size: 0.85rem;
            margin-top: 1rem;
            text-align: left;
            word-break: break-word;
        }

        /* Left Vector Navigation Sidebar - Collapsible */
        aside { 
            width: 180px; 
            padding: 1.5rem 1rem; 
            display: flex; 
            flex-direction: column; 
            gap: 1rem; 
            border-right: 1px solid var(--border-wiki); 
            background-color: var(--bg-canvas); 
            transition: width 0.3s ease;
            position: relative;
            overflow-y: auto;
            max-height: 100vh;
        }
        
        aside.collapsed { 
            width: 50px; 
            padding: 1rem 0.5rem;
        }
        
        .sidebar-toggle-btn {
            position: absolute;
            top: 1rem;
            right: 0.5rem;
            background: var(--wiki-blue);
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        
        aside.collapsed .sidebar-toggle-btn {
            right: auto;
            left: 0.5rem;
        }
        
        .sidebar-toggle-btn:hover {
            background: var(--wiki-blue-hover);
        }
        
        .logo-area { 
            font-size: 1.4rem; 
            font-weight: bold; 
            font-family: Georgia, serif; 
            letter-spacing: -1px; 
            border-bottom: 1px solid var(--border-wiki); 
            padding-bottom: 0.5rem; 
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
        }
        
        aside.collapsed .logo-area {
            font-size: 0.8rem;
            letter-spacing: 0;
        }
        
        .logo-area span { color: var(--wiki-blue); }
        
        .nav-link { 
            font-size: 1.2rem; 
            color: var(--wiki-blue); 
            text-decoration: none; 
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem;
            border-radius: 4px;
            transition: background 0.2s;
        }
        
        .nav-link:hover {
            background: rgba(51, 102, 187, 0.1);
        }
        
        .nav-link span {
            display: none;
        }
        
        .nav-link:hover { text-decoration: underline; }
        
        /* Main Workspace Window Layout */
        main { 
            flex: 1; 
            background-color: var(--bg-page); 
            padding: 1.5rem 2.5rem; 
            display: flex; 
            flex-direction: column; 
            gap: 1rem;
            overflow-y: auto;
        }
        
        /* Global User Status Header */
        #userHeaderBanner { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            gap: 1rem; 
            font-size: 0.85rem; 
            border-bottom: 1px solid #eaecf0; 
            padding-bottom: 0.5rem;
            flex-wrap: wrap;
        }
        
        .user-tag { 
            background: #eaf3ff; 
            color: var(--wiki-blue); 
            padding: 0.2rem 0.5rem; 
            border-radius: 4px; 
            font-weight: bold; 
        }
        
        /* Modern Search Bar */
        .modern-search-container {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex: 0 1 300px;
        }
        
        .search-input-wrapper {
            position: relative;
            flex: 1;
        }
        
        .search-input-wrapper input {
            width: 100%;
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--border-wiki);
            border-radius: 20px;
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.2s;
        }
        
        .search-input-wrapper input:focus {
            border-color: var(--wiki-blue);
            box-shadow: 0 0 0 2px rgba(51, 102, 187, 0.1);
        }
        
        .search-results-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid var(--border-wiki);
            border-top: none;
            border-radius: 0 0 4px 4px;
            max-height: 300px;
            overflow-y: auto;
            display: none;
            z-index: 1000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .search-results-dropdown.active {
            display: block;
        }
        
        .search-result-item {
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            display: flex;
            gap: 0.5rem;
            align-items: center;
            font-size: 0.85rem;
        }
        
        .search-result-item:hover {
            background: #f8f9fa;
        }
        
        .search-result-thumbnail {
            width: 30px;
            height: 30px;
            background: #f0f0f0;
            border-radius: 2px;
            overflow: hidden;
            flex-shrink: 0;
        }
        
        .search-result-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .search-result-info {
            flex: 1;
        }
        
        .search-result-title {
            font-weight: bold;
            color: var(--wiki-blue);
        }
        
        .search-result-namespace {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Article Structure Presentation */
        .firstHeading { 
            font-family: 'Linux Libertine', Georgia, Times, serif; 
            font-size: 1.8rem; 
            border-bottom: 1px solid var(--border-wiki); 
            padding-bottom: 0.25rem; 
            margin-bottom: 0.5rem; 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        
        .article-meta-info {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
            width: 100%;
        }
        
        .wiki-tabs { 
            display: flex; 
            gap: 0.5rem; 
            font-size: 0.8rem; 
            margin-bottom: 1rem; 
            border-bottom: 1px solid #eaecf0;
            align-items: center;
        }
        
        .wiki-tab { 
            padding: 0.4rem 0.8rem; 
            border: 1px solid transparent; 
            border-bottom: none; 
            cursor: pointer; 
            color: var(--wiki-blue); 
        }
        
        .wiki-tab.active { 
            background: var(--bg-page); 
            border-color: var(--border-wiki); 
            border-bottom: 1px solid var(--bg-page); 
            margin-bottom: -1px; 
            color: var(--text-dark); 
            font-weight: bold; 
        }

        .more-tabs-dropdown {
            position: relative;
            display: inline-block;
        }

        .more-tabs-content {
            display: none;
            position: absolute;
            right: 0;
            background-color: #f9f9f9;
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            z-index: 1001;
            border: 1px solid var(--border-wiki);
            border-radius: 4px;
        }

        .more-tabs-content div {
            color: var(--wiki-blue);
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            cursor: pointer;
        }

        .more-tabs-content div:hover { background-color: #f1f1f1; }
        .more-tabs-dropdown:hover .more-tabs-content { display: block; }

        .h2-section-header {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 10px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-wiki);
            margin: 0.2rem 0;
            padding-bottom: 0.2rem;
            font-family: sans-serif;
            font-size: 1.1rem;
            background: transparent;
            width: 100%;
        }

        .h2-section-header:hover { background: #f8f9fa; }

        .h2-section-title {
            display: flex;
            align-items: center;
            font-weight: normal !important;
            margin: 0;
            padding: 0;
        }

        .h2-section-content {
            display: block;
            margin-bottom: 0.5rem;
        }

        .h2-section-content.collapsed { display: none; }

        .edit-pencil {
            font-size: 0.8rem;
            color: var(--wiki-blue);
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s;
            display: none;
        }

        .edit-pencil.visible { display: inline-block; }
        .edit-pencil:hover { opacity: 1; }

        /* Built-In MediaWiki Styles */
        .wiki-body p, .first-para { 
            margin-bottom: 0.8rem; 
            line-height: 1.6; 
            font-size: 0.95rem; 
            text-align: justify; 
            font-family: sans-serif;
        }
        
        .wiki-body h2 { 
            font-family: Georgia, serif; 
            font-size: 1.5rem; 
            border-bottom: 1px solid var(--border-wiki); 
            margin: 1.5rem 0 0.5rem 0; 
            padding-bottom: 0.2rem; 
        }
        
        .wiki-body h3 { 
            font-size: 1.2rem; 
            margin: 1.2rem 0 0.4rem 0; 
        }
        
        .wiki-body h4 { 
            font-size: 1rem; 
            margin: 1rem 0 0.3rem 0; 
        }
        
        .wiki-link { 
            color: var(--wiki-blue); 
            text-decoration: none; 
            cursor: pointer; 
        }
        
        .wiki-link:hover { 
            text-decoration: underline; 
        }
        
        .wiki-link.redlink { 
            color: var(--wiki-red); 
        }

        /* Standard Wikipedia Center-Image Layout Frame */
        .wiki-file-container { 
            display: block; 
            text-align: center; 
            margin: 1.5rem auto; 
            clear: both; 
        }
        
        .wiki-file-box { 
            display: inline-block; 
            border: 1px solid var(--border-wiki); 
            background-color: #f8f9fa; 
            padding: 4px; 
            border-radius: 2px; 
            max-width: 100%; 
        }
        
        .wiki-file-img { 
            display: block; 
            margin: 0 auto; 
            max-width: 100%; 
            height: auto; 
        }
        
        .wiki-file-caption { 
            display: block; 
            font-size: 0.8rem; 
            color: var(--text-muted); 
            text-align: center; 
            margin-top: 4px; 
            padding: 2px 8px; 
        }

        /* Exact Wikipedia Right-Hand Infobox Matrix Architecture */
        .portable-infobox { 
            float: right; 
            width: 300px; 
            background: #f8f9fa; 
            border: 1px solid var(--border-wiki); 
            padding: 0.5rem; 
            margin: 0 0 1rem 1rem; 
            font-size: 0.8rem; 
            border-radius: 2px; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.05); 
        }
        
        .infobox-title { 
            font-size: 1.25rem; 
            font-weight: bold; 
            text-align: center; 
            padding: 0.5rem; 
            background: #eaecf0; 
            margin-bottom: 0.2rem; 
        }
        .infobox-subtitle {
            font-size: 0.9rem;
            text-align: center;
            padding: 0.2rem;
            margin-bottom: 0.5rem;
        }
        .infobox-settlement-type {
            background: #f2f2f2;
            text-align: center;
            padding: 0.2rem;
            font-size: 0.85rem;
            border-top: 1px solid var(--border-wiki);
            border-bottom: 1px solid var(--border-wiki);
        }
        .infobox-header {
            background: #eaecf0;
            font-weight: bold;
            text-align: center;
            padding: 0.2rem;
        }
        .infobox-merged-row {
            text-align: center;
            font-weight: bold;
            background: #eaecf0;
            padding: 0.2rem;
        }
        .wiki-info-box {
            background: #f8f9fa;
            border: 1px solid var(--border-wiki);
            padding: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            border-left: 10px solid var(--wiki-blue);
        }
        .wiki-list {
            margin: 0;
            padding-left: 1.2rem;
            list-style-type: disc;
        }
        
        .infobox-media-row { 
            display: flex; 
            gap: 4px; 
            justify-content: space-between; 
            margin-bottom: 0.5rem; 
        }
        
        .infobox-media-box { 
            flex: 1; 
            border: 1px solid #dddddd; 
            background: #ffffff; 
            padding: 2px; 
            text-align: center; 
        }
        
        .infobox-media-box img { 
            max-width: 100%; 
            height: 50px; 
            object-fit: contain; 
            display: block; 
            margin: 0 auto; 
        }
        
        .infobox-media-caption { 
            font-size: 0.7rem; 
            color: var(--text-muted); 
            text-align: center; 
            display: block; 
            margin-top: 2px; 
        }
        
        .infobox-map { 
            border: 1px solid #dddddd; 
            background: white; 
            padding: 2px; 
            margin-bottom: 0.5rem; 
            text-align: center; 
        }
        
        .infobox-map img { 
            max-width: 100%; 
            height: auto; 
            max-height: 150px; 
        }
        
        .infobox-data-table { 
            width: 100%; 
            border-collapse: collapse; 
        }
        
        .infobox-data-table th { 
            text-align: left; 
            background: #f2f2f2; 
            width: 40%; 
            padding: 0.3rem; 
            border-bottom: 1px solid #ddd; 
            font-weight: bold; 
            vertical-align: top; 
        }
        
        .infobox-data-table td { 
            padding: 0.3rem; 
            border-bottom: 1px solid #ddd; 
            vertical-align: top; 
        }

        /* Advanced Engineering Edit Cockpit */
        .editor-dashboard { 
            display: none; 
            flex-direction: column; 
            gap: 1rem; 
        }
        
        .toolbar { 
            background: #f8f9fa; 
            border: 1px solid var(--border-wiki); 
            padding: 0.5rem; 
            display: flex; 
            gap: 0.5rem; 
            flex-wrap: wrap; 
            border-radius: 4px 4px 0 0; 
            border-bottom: none; 
        }
        
        .tool-btn { 
            background: #fff; 
            border: 1px solid var(--border-wiki); 
            padding: 0.3rem 0.6rem; 
            font-size: 0.8rem; 
            cursor: pointer; 
            border-radius: 2px; 
            font-weight: bold;
            transition: background 0.2s;
        }
        
        .tool-btn:hover { 
            background: #f0f0f0; 
        }
        
        textarea.wiki-editor { 
            width: 100%; 
            height: 350px; 
            font-family: monospace; 
            font-size: 0.9rem; 
            padding: 0.75rem; 
            border: 1px solid var(--border-wiki); 
            border-radius: 0 0 4px 4px; 
            outline: none; 
            resize: vertical; 
            background: #fff; 
            color: #000; 
        }
        
        .summary-input { 
            width: 100%; 
            padding: 0.5rem; 
            border: 1px solid var(--border-wiki); 
            border-radius: 4px; 
            font-size: 0.85rem; 
        }

        /* Info Layout Engine Panels */
        .preview-pane-container { 
            border: 1px dashed var(--wiki-blue); 
            border-radius: 4px; 
            padding: 1rem; 
            background: #fafafa; 
            margin-top: 1rem; 
            display: none; 
        }
        
        .preview-title { 
            font-size: 0.85rem; 
            font-weight: bold; 
            color: var(--wiki-blue); 
            margin-bottom: 0.5rem; 
            text-transform: uppercase; 
        }
        
        /* GitHub Styling Split Diff Grid */
        .github-diff-board { 
            display: flex; 
            flex-direction: column; 
            gap: 2px; 
            font-family: monospace; 
            font-size: 0.85rem; 
            background: #fff; 
            border: 1px solid var(--border-wiki); 
            border-radius: 4px; 
            overflow: hidden; 
            margin-top: 1rem; 
            display: none; 
        }
        
        .diff-line { 
            display: flex; 
            padding: 0.15rem 0.5rem; 
            white-space: pre-wrap; 
        }
        
        .diff-line.removed { 
            background-color: var(--diff-remove-bg); 
            color: var(--diff-remove-text); 
        }
        
        .diff-line.added { 
            background-color: var(--diff-add-bg); 
            color: var(--diff-add-text); 
        }
        
        .diff-line.neutral { 
            background-color: #ffffff; 
            color: #555555; 
        }
        
        .diff-marker { 
            width: 25px; 
            display: inline-block; 
            user-select: none; 
            font-weight: bold; 
        }

        /* Reference Super & Footnote Layout Modules */
        .reference-citation { 
            font-size: 0.75rem; 
            font-weight: bold; 
            vertical-align: super; 
            line-height: 0; 
            margin-left: 2px; 
            color: var(--wiki-blue); 
            cursor: pointer; 
        }
        
        .wiki-references-section { 
            margin-top: 2rem; 
            border-top: 1px solid var(--border-wiki); 
            padding-top: 0.5rem; 
        }
        
        .wiki-references-list { 
            list-style-type: decimal; 
            margin-left: 1.5rem; 
            font-size: 0.85rem; 
        }

        /* Dynamic Infobox Builder Modal Window */
        .modal-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.5); 
            display: none; 
            justify-content: center; 
            align-items: center; 
            z-index: 2000;
            overflow-y: auto;
        }
        
        .modal-card { 
            background: #fff; 
            width: 90%;
            max-width: 450px; 
            border-radius: 6px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.3); 
            padding: 1.5rem; 
            display: flex; 
            flex-direction: column; 
            gap: 1rem; 
            max-height: 90vh; 
            overflow-y: auto;
            margin: auto;
        }
        
        .modal-row { 
            display: flex; 
            flex-direction: column; 
            gap: 0.3rem; 
            font-size: 0.85rem; 
        }
        
        .modal-row input { 
            padding: 0.4rem; 
            border: 1px solid var(--border-wiki); 
            border-radius: 4px; 
        }
        
        .modal-row select {
            padding: 0.4rem;
            border: 1px solid var(--border-wiki);
            border-radius: 4px;
        }
        
        .modal-horizontal { 
            display: flex; 
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        
        .modal-horizontal div { 
            flex: 1; 
            min-width: 150px;
            display: flex; 
            flex-direction: column; 
            gap: 0.3rem; 
        }

        /* System Action Blocks Layout */
        .btn-set { 
            display: flex; 
            gap: 0.5rem; 
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }
        
        .action-btn { 
            padding: 0.5rem 1rem; 
            border-radius: 4px; 
            font-size: 0.85rem; 
            font-weight: bold; 
            border: 1px solid var(--border-wiki); 
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .action-btn.primary { 
            background: var(--wiki-blue); 
            color: white; 
            border-color: var(--wiki-blue); 
        }
        
        .action-btn.success { 
            background: var(--success, #10b981); 
            color: white; 
            border-color: #10b981; 
        }
        
        .action-btn.danger {
            background: var(--wiki-red);
            color: white;
            border-color: var(--wiki-red);
        }

        /* General Wiki Modules Grid */
        .history-log-item { 
            padding: 0.5rem; 
            border-bottom: 1px solid #eaecf0; 
            font-size: 0.85rem; 
            line-height: 1.4; 
        }
        
        .history-log-item:last-child { 
            border-bottom: none; 
        }
        
        .history-timestamp { 
            color: var(--text-muted); 
            font-size: 0.8rem; 
        }
        
        .history-summary { 
            font-style: italic; 
            color: #444; 
            background: #f8f9fa; 
            padding: 2px 6px; 
            border-radius: 3px; 
            cursor: pointer; 
        }
        
        .byte-change {
            font-weight: normal;
            margin-left: 0.5rem;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.8rem;
        }
        
        .byte-change.positive {
            background: rgba(40, 167, 69, 0.2);
            color: var(--bytes-positive);
        }
        
        .byte-change.negative {
            background: rgba(220, 53, 69, 0.2);
            color: var(--bytes-negative);
        }
        
        .byte-change.large {
            font-weight: bold;
        }
        
        .category-box-footer { 
            border: 1px solid var(--border-wiki); 
            background: #f8f9fa; 
            padding: 0.5rem; 
            margin-top: 2rem; 
            font-size: 0.85rem; 
        }

        /* Rating Module Style */
        .star-rating-cluster { 
            display: inline-flex; 
            gap: 4px; 
            align-items: center; 
            margin-left: 10px; 
            font-size: 0.9rem; 
        }

</head>

    <script>
        // ============ GLOBAL STATE MANAGEMENT ============
        let orlePediaMemoryStore = {};
        let orlePediaFileStore = {}; 
        let currentActiveArticleKey = "Main Page";
        let activeSubTabState = "article";
        let currentUserSessionProfile = { username: "", tag: "" };

        function openFileUploadModal() { document.getElementById('fileUploadModal').style.display = 'flex'; }
        function openMovePageModal() { document.getElementById('movePageModal').style.display = 'flex'; }

        let orlePediaTemplateStore = {};
        function openTemplateManager() { renderTemplatesList(); document.getElementById('templateManagerModal').style.display = 'flex'; }
        
        function renderTemplatesList() {
            const list = document.getElementById('existingTemplatesList');
            list.style.display = 'grid';
            list.style.gridTemplateColumns = 'repeat(auto-fill, minmax(100px, 1fr))';
            list.style.gap = '0.5rem';
            list.style.marginTop = '1rem';
            list.innerHTML = Object.keys(orlePediaTemplateStore).map(name => `
                <div style="border:1px solid var(--border-wiki); padding:0.5rem; text-align:center; position:relative; background:#fafafa; border-radius:4px;">
                    <div style="font-weight:bold; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${name}</div>
                    <button onclick="deleteTemplate('${name}')" style="background:var(--wiki-red); color:white; border:none; padding:2px 6px; font-size:0.7rem; border-radius:3px; margin-top:5px; cursor:pointer;">Delete</button>
                </div>
            `).join('') || '<p style="color:var(--text-muted); font-size:0.85rem;">No custom templates saved yet.</p>';
        }

        // SUPABASE BACKEND REQUEST CLIENT MODULE
        async function supabaseRequest(endpoint, method = 'GET', body = null) {
            const headers = {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`,
                'Content-Type': 'application/json',
                'Prefer': 'return=representation'
            };
            const config = { method, headers };
            if (body) config.body = JSON.stringify(body);
            
            const response = await fetch(`${SUPABASE_URL}/rest/v1/${endpoint}`, config);
            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`Database Error: ${errorText}`);
            }
            return await response.json();
        }

        // Update progress bar visual function
        function updateLoaderProgressMetric(percentValue, statusTextStr) {
            document.getElementById('appLoaderProgressBarFill').style.width = percentValue + '%';
            document.getElementById('appLoaderPercentageDisplay').innerText = percentValue + '%';
            document.getElementById('appLoaderStatusMessage').innerText = statusTextStr;
        }

        // 1. FETCH ALL DATA FROM CLOUD WITH PROGRESS AND ERROR HANDLING
        async function loadOrlePediaDataFromCloud() {
            try {
                console.log("🛰️ Fetching encyclopedia records...");
                
                updateLoaderProgressMetric(10, "Fetching layout articles...");
                const articles = await supabaseRequest('articles?select=*');
                
                updateLoaderProgressMetric(30, "Synchronizing revision historical snapshots...");
                const revisions = await supabaseRequest('revisions?select=*');
                
                updateLoaderProgressMetric(50, "Downloading global page rating matrix indices...");
                const ratings = await supabaseRequest('ratings?select=*');
                
                updateLoaderProgressMetric(70, "Mapping linked configuration database binaries...");
                const files = await supabaseRequest('files?select=*');
                
                updateLoaderProgressMetric(90, "Compiling system shorthand code template nodes...");
                const templates = await supabaseRequest('templates?select=*');

                if (Array.isArray(files)) {
                    files.forEach(f => { orlePediaFileStore[f.name] = f.url; });
                }
                if (Array.isArray(templates)) {
                    templates.forEach(t => { orlePediaTemplateStore[t.name] = t.content; });
                }

                if (Array.isArray(articles) && articles.length > 0) {
                    articles.forEach(art => {
                        let artRevs = [];
                        if (Array.isArray(revisions)) {
                            artRevs = revisions
                                .filter(r => r.article_id === art.id)
                                .map(r => ({
                                    timestamp: Date.parse(r.created_at) || Date.now(),
                                    editor: r.editor_name || "Cloud Contributor",
                                    tag: "Synced",
                                    summary: r.edit_summary || "Interface update modification",
                                    content: r.new_content
                                }));
                        }

                        let artRatings = [];
                        if (Array.isArray(ratings)) {
                            artRatings = ratings
                                .filter(r => r.article_id === art.id)
                                .map(r => r.score);
                        }

                        orlePediaMemoryStore[art.title] = {
                            title: art.title,
                            category: art.summary || "General Indexes",
                            content: art.content || "",
                            talk: `== Talk Board Channel for ${art.title} ==\nInitialized remote storage connection parameters.`,
                            history: artRevs.sort((a,b) => a.timestamp - b.timestamp),
                            ratings: artRatings,
                            createdTime: art.created_at ? Date.parse(art.created_at) : Date.now(),
                            author: artRevs.length > 0 ? artRevs[0].editor : "Cloud System"
                        };
                    });
                }
                
                updateLoaderProgressMetric(100, "Initialization complete!");
                setTimeout(() => {
                    const overlay = document.getElementById('appLoaderOverlay');
                    overlay.style.opacity = '0';
                    setTimeout(() => { overlay.style.display = 'none'; }, 400);
                }, 400);

            } catch (err) {
                console.error("❌ Failed to load cloud engine repository arrays:", err);
                document.getElementById('appLoaderStatusMessage').innerText = "Initialization Aborted";
                document.getElementById('appLoaderStatusMessage').style.color = "var(--wiki-red)";
                
                const badge = document.getElementById('appLoaderErrorBadge');
                badge.innerText = `Network/Database Error: ${err.message || err}\nPlease check configuration keys or network accessibility layers.`;
                badge.style.display = "block";
                throw err; // Stop executing script app loads
            }
        }

        // ============ SIDEBAR TOGGLE ============
        function toggleSidebar() {
            const sidebar = document.getElementById('mainSidebar');
            sidebar.classList.toggle('collapsed');
        }

        // ============ ARTICLE SIDEBAR MANAGEMENT ============
        function openArticleSidebar() {
            document.getElementById('articleSidebar').classList.add('visible');
            updateArticleSidebar();
        }
        function closeArticleSidebar() {
            document.getElementById('articleSidebar').classList.remove('visible');
        }

        function updateArticleSidebar() {
            const container = document.getElementById('sidebarDynamicMetricsContainer');
            const targetArticle = orlePediaMemoryStore[currentActiveArticleKey];
            if (!targetArticle) return;

            const linkedFrom = [];
            for (let [k, obj] of Object.entries(orlePediaMemoryStore)) {
                if (obj.content.includes(`[[${currentActiveArticleKey}]]`)) linkedFrom.push(k);
            }

            container.innerHTML = `
                <div style="display:flex; flex-direction:column; gap:1rem;">
                    <section>
                        <h3 class="sidebar-section-title">Page Diagnostics</h3>
                        <div class="sidebar-stat"><span class="sidebar-stat-label">Total Word Length:</span> <span class="sidebar-stat-value">${targetArticle.content.split(/\s+/).filter(w => w).length} words</span></div>
                        <div class="sidebar-stat"><span class="sidebar-stat-label">Allocation Footprint:</span> <span class="sidebar-stat-value">${new Blob([targetArticle.content]).size} Bytes</span></div>
                        <div class="sidebar-stat"><span class="sidebar-stat-label">Administrative Sector:</span> <span class="sidebar-stat-value">${targetArticle.category}</span></div>
                    </section>
                    <section>
                        <h3 class="sidebar-section-title">Backlinks Node Network</h3>
                        ${linkedFrom.length > 0 ? `
                            <ul style="padding-left:1.2rem; font-size:0.8rem; margin-top:0.3rem;">
                                ${linkedFrom.map(title => `<li><span class="wiki-link" onclick="loadArticle('${title}')">${title}</span></li>`).join('')}
                            </ul>
                        ` : '<p style="color:grey; font-size:0.8rem;">No pages link to this article yet.</p>'}
                    </section>
                    <section>
                        <h3 class="sidebar-section-title">Operations</h3>
                        <div style="display:flex; gap:10px; flex-wrap: wrap; margin-top:0.5rem;">
                            <button class="action-btn" onclick="downloadArticle('pdf')">Download PDF</button>
                            <button class="action-btn" onclick="downloadArticle('docx')">Download DOCX</button>
                            <button class="action-btn" onclick="downloadArticle('pptx')">Download PPTX</button>
                            <button class="action-btn danger" onclick="executePermanentDeletion()">⚠️ Permanently Delete Article</button>
                        </div>
                    </section>
                </div>
            `;
        }

        // ============ ARTICLE EXPORT UTILITY FIXED ============
        async function downloadArticle(format) {
            const title = currentActiveArticleKey;
            const targetArticle = orlePediaMemoryStore[title];
            
            if (!targetArticle) {
                return alert("No article data found to initiate compilation export.");
            }

            // Create container derived directly from text storage rather than UI body clone
            const targetMockShell = document.createElement('div');
            targetMockShell.innerHTML = compileRawMarkupToHtml(targetArticle.content);
            
            // Strip structural action elements safely
            targetMockShell.querySelectorAll('.edit-pencil, button').forEach(el => el.remove());

            const text = targetMockShell.innerText;
            const html = `<html><head><title>${title}</title><style>body{font-family:sans-serif;padding:2rem;} .portable-infobox{border:1px solid #ccc;float:right;width:300px;background:#f9f9f9;padding:5px;margin-left:10px;} table{border-collapse:collapse;width:100%;} th,td{border:1px solid #ccc;padding:6px;}</style></head><body><h1>${title}</h1>${targetMockShell.innerHTML}</body></html>`;

            let elementBlobNode;
            let targetFileExtensionStr = format;

            if (format === 'pdf') {
                // Trigger localized print systems smoothly
                const openedWindowPrintIframe = window.open('', '_blank');
                openedWindowPrintIframe.document.write(html);
                openedWindowPrintIframe.document.close();
                openedWindowPrintIframe.print();
                return;
            } else if (format === 'docx') {
                elementBlobNode = new Blob([html], { type: 'application/msword' });
            } else if (format === 'pptx') {
                // Structural fallback text file generation mappings
                const structuralPresentationContent = `OrlePedia Presentation System Node Export\nTitle: ${title}\n\n${text}`;
                elementBlobNode = new Blob([structuralPresentationContent], { type: 'text/plain' });
                targetFileExtensionStr = 'txt';
            }

            const downloadAnchorLink = document.createElement('a');
            downloadAnchorLink.href = URL.createObjectURL(elementBlobNode);
            downloadAnchorLink.download = `${title.replace(/\s+/g, '_')}_export.${targetFileExtensionStr}`;
            document.body.appendChild(downloadAnchorLink);
            downloadAnchorLink.click();
            document.body.removeChild(downloadAnchorLink);
        }

        function performGlobalSearch(event) {
            const query = event.target.value.toLowerCase().trim();
            const dropdown = document.getElementById('searchResultsDropdown');
            if (!query) {
                dropdown.classList.remove('active');
                return;
            }
            const titleResults = [];
            const contentResults = [];
            for (let [key, article] of Object.entries(orlePediaMemoryStore)) {
                if (article.title.toLowerCase().includes(query)) {
                    titleResults.push(article);
                } else if (article.content.toLowerCase().includes(query)) {
                    contentResults.push(article);
                }
            }
            const results = [...titleResults, ...contentResults];
            if (results.length === 0) {
                dropdown.innerHTML = '<div class="search-result-item" style="color:var(--text-muted);">No results found</div>';
                dropdown.classList.add('active');
                return;
            }
            dropdown.innerHTML = results.slice(0, 8).map(article => `
                <div class="search-result-item" onclick="loadArticle('${article.title}'); document.getElementById('searchResultsDropdown').classList.remove('active');">
                    <div class="search-result-thumbnail">
                        <div style="width:100%; height:100%; background:linear-gradient(135deg, var(--wiki-blue), var(--wiki-blue-hover)); display:flex; align-items:center; justify-content:center; color:white; font-weight:bold; font-size:0.7rem;">📄</div>
                    </div>
                    <div class="search-result-info">
                        <div class="search-result-title">${article.title}</div>
                        <div class="search-result-namespace">Article</div>
                    </div>
                </div>
            `).join('');
            dropdown.classList.add('active');
        }

        // Close dropdown when clicking elsewhere
        document.addEventListener('click', function(event) {
            if (!event.target.closest('.modern-search-container')) {
                const dropdown = document.getElementById('searchResultsDropdown');
                if(dropdown) dropdown.classList.remove('active');
            }
        });

        function loadArticle(articleTitle, pushState = true) {
            if (orlePediaMemoryStore[articleTitle] && orlePediaMemoryStore[articleTitle].content.startsWith('#REDIRECT')) {
                const target = orlePediaMemoryStore[articleTitle].content.match(/\[\[(.*?)\]\]/)[1];
                return loadArticle(target, pushState);
            }
            currentActiveArticleKey = articleTitle;
            if (pushState) {
                window.history.pushState({ article: articleTitle }, '', '/ORLEPEDIA/' + encodeURIComponent(articleTitle));
            }
            exitEditorDashboard();
            if (!orlePediaMemoryStore[articleTitle]) {
                orlePediaMemoryStore[articleTitle] = {
                    title: articleTitle,
                    category: "General Indexes",
                    content: ``,
                    talk: `== Talk Channel for ${articleTitle} ==\nInitialized structural discussion line.`,
                    history: [],
                    ratings: [],
                    createdTime: Date.now(),
                    author: currentUserSessionProfile.username || "System Core"
                };
            }
            document.getElementById('displayArticleTitle').innerText = articleTitle;
            const article = orlePediaMemoryStore[articleTitle];
            const revisionCount = article.history.length;
            document.getElementById('articleMetaInfo').innerHTML = `By ${article.author} • ${revisionCount} revision${revisionCount !== 1 ? 's' : ''}`;
            renderRatingStarsCluster();
            switchSubTab(activeSubTabState);
            openArticleSidebar();
        }

        function switchSubTab(targetTab) {
            activeSubTabState = targetTab;
            document.querySelectorAll('.wiki-tab').forEach(t => t.classList.remove('active'));
            const contentBox = document.getElementById('wikiTabContentBody');
            const targetArticle = orlePediaMemoryStore[currentActiveArticleKey];
            
            if (targetTab === 'article') {
                document.getElementById('tabArticle').classList.add('active');
                let finalHtml = compileRawMarkupToHtml(targetArticle.content);
                const cats = targetArticle.content.match(/\[\[Category:([^\]]+)\]\]/g);
                if (cats) {
                    finalHtml += `<div class="category-footer">Categories: ${cats.map(c => {
                        const name = c.match(/\[\[Category:([^\]]+)\]\]/)[1];
                        return `<span class="category-item" onclick="loadCategoryView('${name}')">${name}</span>`;
                    }).join(' | ')}</div>`;
                }
                contentBox.innerHTML = finalHtml;
            } else if (targetTab === 'talk') {
                document.getElementById('tabTalk').classList.add('active');
                contentBox.innerHTML = `<div>${targetArticle.talk || 'No discussions registered.'}</div>`;
            } else if (targetTab === 'history') {
                document.getElementById('tabHistory').classList.add('active');
                contentBox.innerHTML = `<div>Revision Logs History structural list context goes here...</div>`;
            } else if (targetTab === 'info') {
                contentBox.innerHTML = `
                    <div style="padding:1rem; background:#f8f9fa; border:1px solid var(--border-wiki); border-radius:4px;">
                        <h3>Administrative Metadata Panel</h3>
                        <p style="margin-top:0.5rem;">Managing structural operations layer for page instance nodes.</p>
                    </div>
                `;
            }
            updateArticleSidebar();
        }

        function exitEditorDashboard() {
            document.getElementById('masterEditorContainer').style.display = "none";
            document.getElementById('articleContainerWrapper').style.display = "block";
        }
        function toggleEditMode() {
            document.getElementById('articleContainerWrapper').style.display = "none";
            document.getElementById('masterEditorContainer').style.display = "flex";
            document.getElementById('wikiRawInputTextarea').value = orlePediaMemoryStore[currentActiveArticleKey].content;
        }
        function triggerClientPreview() {}
        function renderRatingStarsCluster() {}
        function wrapEditorText(openTag, closeTag) {}
        function openModal(id) {}
        function closeModal(id) {}

        function compileRawMarkupToHtml(txt) {
            if (!txt) return "";
            return txt.replace(/'''(.*?)'''/g, '<b>$1</b>')
                      .replace(/''(.*?)''/g, '<i>$1</i>')
                      .replace(/\[\[([^|\]]+)\]\]/g, '<span class="wiki-link" onclick="loadArticle(\'$1\')">$1</span>');
        }

        function navigateTo(title) {
            window.history.pushState({ article: title }, '', '/ORLEPEDIA/' + encodeURIComponent(title));
            loadArticle(title);
        }

        // ============ APP INITIALIZATION ============
        document.addEventListener('DOMContentLoaded', async () => {
            // Initiate cloud boot procedures directly
            await loadOrlePediaDataFromCloud();
            
            // Routing configuration setup routines
            const params = new URLSearchParams(window.location.search);
            const p = params.get('p');
            if (p) {
                const articleName = decodeURIComponent(p.replace(/^\//, ''));
                navigateTo(articleName);
            } else {
                const path = window.location.pathname.split('/').pop();
                if (path && path !== 'index.html' && !path.includes('.html')) {
                    loadArticle(decodeURIComponent(path));
                } else {
                    loadArticle(currentActiveArticleKey);
                }
            }
            lucide.createIcons();
        });

        window.onpopstate = (e) => e.state && e.state.article && loadArticle(e.state.article, false);
    </script>
</body>
</html>
